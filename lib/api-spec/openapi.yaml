openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dýrey Veterinary Hospital API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: appointments
    description: Appointment booking operations
  - name: products
    description: Shop product operations
  - name: orders
    description: Order operations
  - name: services
    description: Veterinary service operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List veterinary services
      responses:
        "200":
          description: List of vet services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VetService"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid input

  /appointments/summary:
    get:
      operationId: getAppointmentsSummary
      tags: [appointments]
      summary: Get appointments summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentsSummary"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    delete:
      operationId: cancelAppointment
      tags: [appointments]
      summary: Cancel appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List shop products
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: Get featured products for homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/categories:
    get:
      operationId: listProductCategories
      tags: [products]
      summary: List product categories with counts
      responses:
        "200":
          description: Product categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductCategory"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    VetService:
      type: object
      required: [id, name, description, duration, price]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        duration:
          type: integer
          description: Duration in minutes
        price:
          type: number

    Appointment:
      type: object
      required: [id, ownerName, ownerEmail, ownerPhone, petName, petType, serviceId, serviceName, date, time, status, createdAt]
      properties:
        id:
          type: integer
        ownerName:
          type: string
        ownerEmail:
          type: string
        ownerPhone:
          type: string
        petName:
          type: string
        petType:
          type: string
        serviceId:
          type: integer
        serviceName:
          type: string
        date:
          type: string
        time:
          type: string
        status:
          type: string
          description: "pending | confirmed | completed | cancelled"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AppointmentInput:
      type: object
      required: [ownerName, ownerEmail, ownerPhone, petName, petType, serviceId, date, time]
      properties:
        ownerName:
          type: string
        ownerEmail:
          type: string
        ownerPhone:
          type: string
        petName:
          type: string
        petType:
          type: string
        serviceId:
          type: integer
        date:
          type: string
        time:
          type: string
        notes:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        date:
          type: string
        time:
          type: string
        status:
          type: string
        notes:
          type: string

    AppointmentsSummary:
      type: object
      required: [total, pending, confirmed, completed, cancelled, todayCount]
      properties:
        total:
          type: integer
        pending:
          type: integer
        confirmed:
          type: integer
        completed:
          type: integer
        cancelled:
          type: integer
        todayCount:
          type: integer

    Product:
      type: object
      required: [id, name, description, price, category, inStock, featured]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        inStock:
          type: boolean
        featured:
          type: boolean
        stockCount:
          type: integer

    ProductCategory:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer

    OrderItem:
      type: object
      required: [productId, productName, quantity, unitPrice]
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number

    Order:
      type: object
      required: [id, customerName, customerEmail, items, totalAmount, status, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalAmount:
          type: number
        status:
          type: string
          description: "pending | processing | shipped | delivered"
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [customerName, customerEmail, items]
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        items:
          type: array
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId:
                type: integer
              quantity:
                type: integer
